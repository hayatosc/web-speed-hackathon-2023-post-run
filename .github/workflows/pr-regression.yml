name: PR Regression

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 7.24.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run local regression
        run: pnpm run regression:local | tee regression-local.txt

      - name: Append job summary
        if: always()
        run: |
          {
            echo '## Local Regression'
            echo ''
            echo '```text'
            if [ -f regression-local.txt ]; then
              cat regression-local.txt
            else
              echo 'regression-local.txt was not generated.'
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload regression artifacts
        if: always() && (hashFiles('regression-local.txt') != '' || hashFiles('.artifacts/regression-local/*') != '')
        uses: actions/upload-artifact@v4
        with:
          name: regression-local
          path: |
            regression-local.txt
            .artifacts/regression-local
